services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
      NODE_ENV: production
      PORT: 4000
    expose:
      - '4000'

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-/}
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - server
